<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The IT Daily</title>
    <meta name="description" content="Choose language for The IT Daily links page." />
    <meta name="robots" content="index,follow" />
    <link rel="alternate" hreflang="ru" href="/ru/" />
    <link rel="alternate" hreflang="en" href="/en/" />
    <link rel="alternate" hreflang="x-default" href="/" />
    <style>
      body { font-family: Inter, system-ui, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #141b33; color: #f3f6ff; }
      .box { text-align: center; padding: 24px; border: 1px solid rgba(255,255,255,.2); border-radius: 12px; }
      a { color: #47d4ff; margin: 0 8px; }
    </style>
    <script>
      const preferred = (navigator.language || '').toLowerCase().startsWith('en') ? '/en/' : '/ru/';
      window.location.replace(preferred);
    </script>
  </head>
  <body>
    <div class="box">
      <p>Select language / Выберите язык:</p>
      <a href="/en/" hreflang="en">English</a>
      <a href="/ru/" hreflang="ru">Русский</a>
    </div>
  </body>
</html>
